# Per-repo fnox config for connectrpc-cedar. Secrets live in the macOS
# keychain (service = "fnox", shared with the user's other repos).
#
# CF deploy tasks shell out to wrangler under `fnox exec --` so these resolve
# to env vars at runtime; wrangler reads CLOUDFLARE_API_TOKEN /
# CLOUDFLARE_ACCOUNT_ID directly.
#
# Naming convention follows the pattern in http-nu-email-native/fnox.toml:
#   - Cloud-provider creds (CLOUDFLARE_*) use bare names — one CF API token
#     shared across repos via the global ~/.config/fnox.
#   - Per-repo secrets (this Worker's macaroon root key, the deployed URL)
#     are repo-scoped under CONNECTRPC_CEDAR_*  to avoid colliding with
#     other repos that use the same fnox service.
#
# See [[feedback_secrets_fnox_mise]] (fnox→mise→wrangler chain) and
# [[feedback_cloud_project_per_repo]] (per-repo CF resource isolation).

[providers.keychain]
type = "keychain"
service = "fnox"

[secrets]
# Shared with other CF-using repos. If you want a scoped per-repo token,
# change `value` to "CONNECTRPC_CEDAR_CLOUDFLARE_API_TOKEN" and store a
# narrower-scoped token under that keychain item.
CLOUDFLARE_API_TOKEN  = { provider = "keychain", value = "CLOUDFLARE_API_TOKEN" }
CLOUDFLARE_ACCOUNT_ID = { provider = "keychain", value = "CLOUDFLARE_ACCOUNT_ID" }

# Macaroon root key — base64(32 bytes). Set as a wrangler secret on first
# deploy; the worker reads it from env.SESSION_KEY.
SESSION_KEY = { provider = "keychain", value = "CONNECTRPC_CEDAR_SESSION_KEY" }

# Deployed Worker URL (e.g. https://<name>.<sub>.workers.dev).
CONNECTRPC_CEDAR_WORKER_URL = { provider = "keychain", value = "CONNECTRPC_CEDAR_WORKER_URL" }

# Remote D1 database id. Stored in the keychain instead of editing
# wrangler.toml.
CONNECTRPC_CEDAR_D1_DATABASE_ID= { provider = "keychain", value = "CONNECTRPC_CEDAR_D1_DATABASE_ID" }

# ── Publishing tokens (the release tasks) ──────────────────────────────────
# User-level, shared across repos like the CLOUDFLARE_* creds (bare names).
# Store once in the keychain — MUST pass `-p keychain` or fnox inlines the
# value as plaintext into this file:
#   fnox set -p keychain CARGO_REGISTRY_TOKEN <token>   # crates.io/settings/tokens
#   fnox set -p keychain JSR_TOKEN            <token>   # jsr.io → account → tokens
#
# Consumed by: `cargo:publish -- --execute` (cargo reads CARGO_REGISTRY_TOKEN
# from env) and `kit:jsr-publish` (passes JSR_TOKEN to `jsr publish --token`).
CARGO_REGISTRY_TOKEN = { provider = "keychain", value = "CARGO_REGISTRY_TOKEN" }
JSR_TOKEN            = { provider = "keychain", value = "JSR_TOKEN" }
