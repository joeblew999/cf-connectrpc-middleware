name = "rauthy-cedar-api"
main = "build/index.js"
compatibility_date = "2026-04-22"

[build]
command = "cargo install -q \"worker-build@^0.8\" && worker-build --release"
# `cwd` is resolved relative to where `wrangler dev` was LAUNCHED. Both serve.nu
# scripts (this worker's own, and the gateway's multi-Worker run) launch from the
# repo root, so this path is stable and worker-build runs in this crate's dir.
# Without it the build would run at the repo root and parse the workspace
# Cargo.toml ("missing field package").
cwd = "examples/rauthy-cedar/worker"

# Where the Worker validates tokens against. For local `wrangler dev` against a
# `recipe:local` / serve.nu Rauthy, point these at it (miniflare reaches host
# localhost). For a deployed Worker use the public https issuer.
[vars]
RAUTHY_ISSUER   = "http://localhost:8088/auth/v1/"
RAUTHY_JWKS_URL = "http://localhost:8088/auth/v1/oidc/certs"
RAUTHY_AUD      = "worker-client"

# The metrics SINK the Worker injects into make(): a Workers Analytics Engine
# dataset. The MetricsInterceptor writes one data point per RPC
# (blobs = [metric_name, procedure, status_class], doubles = [value]).
# `env.analytics_engine("AE")` reads this binding.
[[analytics_engine_datasets]]
binding = "AE"
dataset = "rauthy_cedar_rpc"

# The rate LIMITER the Worker injects into make(): the GA Workers Rate Limiting
# binding (works in `wrangler dev`). The RateLimitLayer keys on cf-connecting-ip
# and rejects with Connect `resource_exhausted` (HTTP 429) past the limit.
# `env.rate_limiter("RL")` reads this binding. `period` must be 10 or 60.
[[ratelimits]]
name = "RL"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 100
  period = 60
