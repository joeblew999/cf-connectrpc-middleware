# Pitchfork supervises the two long-running dev processes so the web GUI
# stays available across coding sessions and edits.
#
# Start them all:   mise run dev:up
# Watch logs:       mise run dev:logs
# Stop them all:    mise run dev:down
# TUI dashboard:    mise run dev:tui
#
# URLs (after start):
#   - https://localhost:5173/preview   Vite dev (HMR) — frontend iteration
#   - https://localhost:8787/preview   Wrangler dev   — production-like
#
# Vite's proxy forwards RPCs (/workers.*) to the worker at :8787 so the
# /preview at :5173 still talks to a real backend.

[daemons.worker]
run = "mise run worker:dev"
auto_restart = true
# Wrangler prints "Ready on https://localhost:8787" when the wasm build
# finishes and the local Worker is listening. `start` waits for that.
output = "Ready on"

[daemons.web]
run = "mise run kumo:web-dev"
auto_restart = true
# Vite prints "Local:" once the dev server is bound.
output = "Local:"
