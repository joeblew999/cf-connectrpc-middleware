let root = (pwd)
cd $"($root)/($env.MULTITENANT_WORKER)"
print "wiping local D1..."
fnox exec -- wrangler d1 execute DB --local --command $env.WIPE_SQL
cd $"($root)/($env.MULTITENANT_WEB)"
SCENARIO=editorial pnpm seed:dev
"""

[tasks."mt:seed:dev:remysport"]
description = "ATOMIC — wipe local D1, then seed the REMYSPORT scenario. After this runs the local DB has coach/captain/scout/manager + Bangkok Suns teams and NOTHING ELSE."
shell = "nu -c"
run = """
let root = (pwd)
