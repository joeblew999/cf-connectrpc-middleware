cd $env.MULTITENANT_WEB
pnpm exec kumo init
"""

[tasks."mt:web:dev"]
description = "Vite dev server in web-kumo/ (HTTPS :5173, prod-parity)"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WEB
pnpm dev
"""

[tasks."mt:web:dev-http"]
description = "Vite dev server, HTTP on :5175 (for headless screenshot tools)"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WEB
pnpm dev:http
"""

[tasks."mt:web:build"]
description = "Build web-kumo/ for production (output: dist/)"
shell = "nu -c"
