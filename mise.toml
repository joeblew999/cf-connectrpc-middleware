[tools]
rust = "stable"
node = "latest"
"aqua:nushell/nushell" = "latest"

# Cloudflare Workers CLI: dev server + deploys. Drives worker-build.
# Note: `buf` is intentionally NOT here. protoc IS (below) — connectrpc-build
# 0.6 shells out to it for codegen.
"npm:wrangler" = "latest"

# protoc — REQUIRED by connectrpc-build 0.6's build.rs codegen (it shells
# out to `protoc`). connectrpc-build 0.4 used a pure-Rust path and needed
# no external tool; 0.6 reintroduced the protoc dependency. Without this
# the example worker's build.rs panics: "protoc failed: No version is set
# for shim: protoc". (protoc is the compiler; `buf` is the wrapper we still
# avoid — Rust uses connectrpc-build, TS uses npm-local @bufbuild/buf.)
"aqua:protocolbuffers/protobuf/protoc" = "35.0"

# Frontend (consumer examples). Kumo UI for the Orange theme.
"npm:@cloudflare/kumo" = "latest"

# Cedar policy CLI (validate / authorize / format). Matches runtime cedar-policy = "4".
"cargo:cedar-policy-cli" = "4.11.0"

# NOTE: cedar-language-server and cedar-policy-mcp-schema-generator are
# NOT here. Neither is published to crates.io (cargo install 404s) — both
# live only inside Cedar's git workspaces (cedar/, cedar-for-agents/) as
# workspace members. mise's `cargo:` backend can't select a single member
# from a git workspace, so they're built by the `cedar:tools` task with an
# explicit `cargo install --git <url> --rev <hash> <crate>`. The binaries
# land in {{config_root}}/.tools/bin, which `[env] _.path` puts on PATH.

# NOTE: worker-build is NOT pinned here. Rust on this stack is rustup-managed
# (RUSTUP_HOME=~/.rustup; ~/.cargo/bin is the toolchain home and stays first on
# PATH), and wrangler's wrangler.toml `[build]` command already does
# `cargo install worker-build@^0.8` into ~/.cargo/bin. A mise `cargo:worker-build`
# pin would just be shadowed by that copy — confusing, never used. Let the rust
# toolchain own it.

# Dev-quality tools: unused deps, macro expansion (for connectrpc-build debugging).
"cargo:cargo-machete" = "latest"
"cargo:cargo-expand" = "latest"

# Pitchfork: process supervisor for long-running dev daemons (wrangler + vite).
# Configured via pitchfork.toml at the project root.
"aqua:jdx/pitchfork" = "latest"


[env]
# Repo-local bin dir for tools we `cargo install` from git (cedar
# language-server + mcp-schema-generator — see `cedar:tools`). Gitignored.
# Put first so these win over any stale ~/.cargo/bin copies.
_.path = ["{{config_root}}/.tools/bin"]

# Single source of truth for the wasm target. Used by every cargo:* task.
WASM_TARGET = "wasm32-unknown-unknown"

# Original upstream owner of the example repos. .src/<repo> has a
# remote called `upstream` pointing here (read-only — for pulling
# updates).
UPSTREAM = "connyay"

# Your fork owner. .src/<repo> has remote `origin` pointing here
# (push target). Used by `src:fork` and `src:clone`.
FORK = "joeblew999"

# Working branch in each .src/<repo> for the Cedar+Kumo integration.
WORK_BRANCH = "cedar"

# Path to the Kumo+Orange variant of the multitenant frontend.
# Sibling to the original `web/`, which we leave untouched as the
# visual baseline / reference implementation.
MULTITENANT_WEB = ".src/example-multitenant-worker/web-kumo"

# Path to the multitenant worker (rust + wrangler.toml live here).
MULTITENANT_WORKER = ".src/example-multitenant-worker"

# Better Rust diagnostics during dev.
RUST_BACKTRACE = "1"

# Cedar "for agents" repo — source of the analysis MCP server, which
# upstream ships Docker-only (no npm registry build). `cedar:mcp:install`
# clones it here (gitignored, like the other .src/ clones) and builds the
# TS server with the mise-managed node toolchain. CEDAR_AGENTS_REPO is on
# the cedar-policy org, NOT $FORK/$UPSTREAM — so it's cloned directly, not
# via the src:* fork workflow.
CEDAR_AGENTS_REPO = "cedar-policy/cedar-for-agents"
CEDAR_AGENTS_DIR = ".src/cedar-for-agents"
# Subdir holding the analysis MCP server (package.json bin `mcp` →
# dist/server.js). Built by `cedar:mcp:install`, pointed at by `cedar:mcp:config`.
CEDAR_MCP_DIR = ".src/cedar-for-agents/js/cedar-analysis-mcp-server/mcp"

# Multi-statement SQL that empties the D1 in reverse-FK order. Used by
# every seed:* task BEFORE seeding so each scenario lands in a clean
# DB — no leftover users from a previous scenario. The 12 tables come
# from .src/example-multitenant-worker/migrations/0001_init.sql.
WIPE_SQL = "DELETE FROM consumed_nonces; DELETE FROM sso_states; DELETE FROM sso_configs; DELETE FROM invoices; DELETE FROM subscriptions; DELETE FROM invitations; DELETE FROM org_memberships; DELETE FROM billing_memberships; DELETE FROM organizations; DELETE FROM billing_accounts; DELETE FROM identities; DELETE FROM users;"


# ── TASK MAP (mise tasks) ────────────────────────────────────────────
#  src:*      FOUNDATION   pinned upstream source (connect-rust/buffa/connectrpc-workers)
#  cargo:*    MIDDLEWARE   build/test/lint the crates/* tower middleware
#  cedar:*    MIDDLEWARE   Cedar policy validate/format/test + editor/MCP tooling
#  kit:*      KUMO KIT     build/test/publish the Kumo+Connect client kit (packages/kumo-connectrpc-kit)
#  example:*  EXAMPLE      the rauthy-cedar reference (native server + CF worker)
#  mt:*       DEMO         the vendored multitenant demo (mt:worker / mt:web / mt:seed / mt:cf / mt:dev)
#  stack:* deploy:*  ORCHESTRATION  the whole Rauthy+Cedar stack up/deploy
# ─────────────────────────────────────────────────────────────────────


# =============================================================================
# mise:* — bootstrap
# =============================================================================

[tasks."mise:install"]
description = "Install all CLI tools defined in mise.toml"
shell = "nu -c"
run = "mise install"


# =============================================================================
# cargo:* — Rust dev loop (all noun:verb)
# =============================================================================

[tasks."cargo:check"]
description = "Check the whole MIXED workspace: native (incl. the native-only rauthy-cedar-server) + the wasm32 worker (the real wasm proof for the middleware)"
shell = "nu -c"
run = """
# The workspace is now MIXED: the crates/* middleware + the rauthy-cedar app
# are target-agnostic, but rauthy-cedar-server is NATIVE-ONLY (hyper/tokio-net
# → mio, which emits compile_error! on wasm32). So we can't `--target wasm32`
# the whole workspace anymore. Instead:
#   1. native `--workspace` covers everything, including the server.
#   2. the wasm worker (a separate workspace) transitively compiles the whole
#      middleware stack on wasm32 — that's the genuine wasm proof.
cargo check --workspace
cargo check --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml
"""

[tasks."cargo:build"]
description = "Build the whole MIXED workspace: native (incl. rauthy-cedar-server) + the wasm32 worker (debug, fast iteration)"
shell = "nu -c"
run = """
# See cargo:check for why this is native-workspace + wasm-worker, not a single
# `--target wasm32` across the workspace.
cargo build --workspace
cargo build --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml
"""

[tasks."cargo:build:release"]
description = "Build release: native workspace (incl. rauthy-cedar-server) + the wasm32 worker, optimized for Workers"
shell = "nu -c"
run = """
# Same mixed-workspace split as cargo:build (the whole-workspace wasm32 build
# can't compile the native-only server). The wasm worker carries the Worker
# release profile (opt-level=z, lto) in its own Cargo.toml.
cargo build --workspace --release
cargo build --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml --release
"""

[tasks."cargo:test"]
description = "Run tests on native target (library is target-agnostic)"
shell = "nu -c"
run = "cargo test"

[tasks."cargo:lint"]
description = "Lint the whole MIXED workspace with clippy (deny warnings): native --all-targets (incl. rauthy-cedar-server) + the wasm32 worker"
shell = "nu -c"
run = """
# Native workspace (covers the native-only server + all test targets) AND the
# wasm worker on wasm32 (the middleware's real wasm lint surface). See
# cargo:check for the mixed-workspace rationale.
cargo clippy --workspace --all-targets -- -D warnings
cargo clippy --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml -- -D warnings
"""

[tasks."cargo:format"]
description = "Format code with rustfmt"
shell = "nu -c"
run = "cargo fmt --all"

[tasks."cargo:fix"]
description = "Auto-fix: rustfmt + clippy --fix"
shell = "nu -c"
run = """
cargo fmt --all
# Mixed workspace: native --all-targets covers everything (incl. the
# native-only server); the worker is fixed on wasm32 separately.
cargo clippy --workspace --all-targets --fix --allow-dirty --allow-staged -- -D warnings
cargo clippy --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml --fix --allow-dirty --allow-staged -- -D warnings
"""

[tasks."cargo:watch"]
description = "Watch loop: bacon runs check/clippy/test on change"
shell = "nu -c"
run = "bacon"

[tasks."cargo:machete"]
description = "Find unused dependencies (matters for wasm binary size)"
shell = "nu -c"
run = "cargo machete"

[tasks."cargo:expand"]
description = "Show macro-expanded output for a crate (debug connectrpc-build codegen). Defaults to rauthy-cedar-app, where include_generated!() lives. Usage: mise run cargo:expand -- [crate]"
shell = "nu -c"
usage = '''
arg "crate" help="Package to expand (default: rauthy-cedar-app, the include_generated! site)" default="rauthy-cedar-app"
'''
# The workspace root is a virtual manifest, so `cargo expand` needs an explicit
# package. Default to the app that actually invokes the codegen macro.
run = "cargo expand -p $env.usage_crate"

[tasks."cargo:clean"]
description = "Remove target/ and any wasm artifacts"
shell = "nu -c"
run = """
rm -rf target
print "Cleaned target/"
"""

[tasks."cargo:pre-commit"]
description = "Quality gate: cargo:format + cargo:lint + cargo:test + cargo:machete"
depends = ["cargo:format", "cargo:lint", "cargo:test", "cargo:machete"]
shell = "nu -c"
run = "print 'pre-commit checks passed'"


# =============================================================================
# cedar:* — Cedar policy workflow
# =============================================================================

[tasks."cedar:validate"]
description = "Run `cedar validate` on every Cedar policy dir: the examples/*-policies/ trees AND the rauthy-cedar example's own app/policies/ (the policies it actually runs)"
shell = "nu -c"
run = """
# Two layouts: the standalone examples/*-policies/ trees (schema beside a
# policies/ subdir) and the rauthy-cedar example, whose schema + policies sit
# together in app/policies/ — both are validated so `mise run cedar:validate`
# covers the policies the running example loads via include_str!.
let standalone = (glob examples/*-policies | each {|dir|
  { schema_glob: $"($dir)/*.cedarschema", policy_glob: $"($dir)/policies/*.cedar", name: ($dir | path basename) }
})
let inline = (glob examples/*/app/policies | each {|dir|
  { schema_glob: $"($dir)/*.cedarschema", policy_glob: $"($dir)/*.cedar", name: ($dir | path dirname | path dirname | path basename) }
})
let trees = ($standalone | append $inline)
if ($trees | is-empty) {
  print "no Cedar policy dirs found — skipping"
  exit 0
}
for tree in $trees {
  let schemas = (glob $tree.schema_glob)
  if ($schemas | is-empty) {
    print $"($tree.name): no .cedarschema — skipping"
    continue
  }
  let schema = ($schemas | first)
  cedar check-parse --schema $schema
  for policy in (glob $tree.policy_glob) {
    print $"validate ($tree.name)/($policy | path basename)"
    cedar validate --schema $schema --policies $policy
  }
  print $"($tree.name): OK"
}
"""

[tasks."cedar:format"]
description = "Format every Cedar policy file in place: examples/*-policies/policies/ AND the rauthy-cedar example's app/policies/"
shell = "nu -c"
run = """
let files = (glob examples/*-policies/policies/*.cedar | append (glob examples/*/app/policies/*.cedar))
for policy in $files {
  cedar format --policies $policy --write
}
"""

[tasks."cedar:test"]
description = "Run cedar authorize against representative requests for every examples/*-policies/tests/run.nu found. Non-zero exit on any mismatch."
shell = "nu -c"
run = """
let runners = (glob examples/*-policies/tests/run.nu)
if ($runners | is-empty) {
  print "no examples/*-policies/tests/run.nu — skipping"
  exit 0
}
for runner in $runners {
  let dir = ($runner | path dirname | path dirname)
  print $"── ($dir | path basename) ──"
  cd $dir
  nu tests/run.nu
  cd -
}
"""


# =============================================================================
# example:* — THIS repo's real reference example (examples/rauthy-cedar):
# the crates/* middleware proven on a real connectrpc + buffa service,
# running native AND on a Cloudflare Worker from one shared app.
# =============================================================================

[tasks."example:check"]
description = "Build the rauthy-cedar example both ways: native server + wasm worker"
shell = "nu -c"
run = """
cargo check -p rauthy-cedar-app -p rauthy-cedar-server
cargo check --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml
"""

[tasks."example:test"]
description = "Test the rauthy-cedar example: crate tests + the Cedar policy proof (no external deps)"
shell = "nu -c"
run = """
cargo test -p rauthy-cedar-app -p rauthy-cedar-server
nu examples/rauthy-cedar/tests/run.nu
"""

[tasks."example:serve"]
description = "Run the rauthy-cedar NATIVE server e2e: boots Rauthy in Docker, mints a token, asserts the 4 oidc→cedar cases (needs a Docker daemon)"
shell = "nu -c"
run = "nu examples/rauthy-cedar/server/serve.nu"

[tasks."example:worker"]
description = "Run the rauthy-cedar CF Worker via wrangler dev (needs a Rauthy at :8088 — start one with example:serve or vm-uncloud recipe:local)"
shell = "nu -c"
run = """
cd examples/rauthy-cedar/worker
wrangler dev
"""


# =============================================================================
# kit:* — KUMO KIT — build/test/publish the Kumo+ConnectRPC client kit at
# packages/kumo-connectrpc-kit. These root tasks delegate into the kit dir;
# they mirror packages/kumo-connectrpc-kit/mise.toml so the pillar is visible
# from the repo root. JSR doesn't transpile JSX, so the kit is PRE-BUILT (tsc)
# to dist/ and the compiled .js + .d.ts are published.
# =============================================================================

[tasks."kit:install"]
description = "Install the kit's peer/dev deps (react, @cloudflare/kumo, @connectrpc/*) via pnpm"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
pnpm install
"""

[tasks."kit:typecheck"]
description = "Type-check the kit (tsc --noEmit)"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
pnpm exec tsc --noEmit
"""

[tasks."kit:build"]
description = "Compile the kit's src/*.{ts,tsx} → dist/*.js + *.d.ts (JSX compiled; JSR won't)"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
rm -rf dist
pnpm exec tsc
"""

[tasks."kit:test"]
description = "Run the kit's test suite (vitest run)"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
pnpm exec vitest run
"""

[tasks."kit:jsr-check"]
description = "JSR dry-run on the kit (slow-types, packaging) — no publish"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
pnpm dlx jsr publish --dry-run --allow-dirty
"""

[tasks."kit:jsr-publish"]
description = "Publish the kit to JSR. Normally CI does this on push (OIDC); this is the manual path."
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
pnpm dlx jsr publish
"""


# =============================================================================
# VENDORED MULTITENANT DEMO — the task groups below (all `mt:*`:
# mt:worker:* · mt:web:* · mt:seed:* · mt:cf:* · mt:dev:*) all drive
# `.src/example-multitenant-worker`, a
# gitignored connyay reference app. It is NOT this repo's library (crates/*)
# nor its example (examples/rauthy-cedar/, see example:* above). Kept for the
# deployed multitenant demo; ignore them when working on the library itself.
# =============================================================================

[tasks."mt:worker:d1-migrate"]
description = "Apply D1 migrations to the local Workers SQLite simulator"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WORKER
wrangler d1 migrations apply DB --local
"""

[tasks."mt:worker:dev"]
description = "Run the multitenant worker (wrangler dev, HTTPS, serves web-kumo/dist)"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WORKER
wrangler dev --local-protocol=https --port=8787
"""


# =============================================================================
# mt:dev:* — process supervision (pitchfork) for the vendored multitenant
# demo's long-running daemons. Config lives in pitchfork.toml at the project root.
# =============================================================================

[tasks."mt:dev:up"]
description = "Start worker + web (pitchfork daemons), keep them alive"
