[tools]
rust = "stable"
node = "latest"
"aqua:nushell/nushell" = "latest"

# Cloudflare Workers CLI: dev server + deploys. Drives worker-build.
# Note: buf is intentionally NOT here — Rust side uses connectrpc-build
# in build.rs; TS side gets @bufbuild/buf via npm install in web/.
"npm:wrangler" = "latest"

# Frontend (consumer examples). Kumo UI for the Orange theme.
"npm:@cloudflare/kumo" = "latest"

# Cedar policy CLI (validate / authorize / format). Matches runtime cedar-policy = "4".
"cargo:cedar-policy-cli" = "4.11.0"

# Rust → wasm32 bundler invoked by wrangler for worker-rs projects.
"cargo:worker-build" = "latest"

# Dev-quality tools: unused deps, macro expansion (for connectrpc-build debugging).
"cargo:cargo-machete" = "latest"
"cargo:cargo-expand" = "latest"

# Pitchfork: process supervisor for long-running dev daemons (wrangler + vite).
# Configured via pitchfork.toml at the project root.
"aqua:jdx/pitchfork" = "latest"


[env]
# Single source of truth for the wasm target. Used by every cargo:* task.
WASM_TARGET = "wasm32-unknown-unknown"

# Original upstream owner of the example repos. .src/<repo> has a
# remote called `upstream` pointing here (read-only — for pulling
# updates).
UPSTREAM = "connyay"

# Your fork owner. .src/<repo> has remote `origin` pointing here
# (push target). Used by `src:fork` and `src:clone`.
FORK = "joeblew999"

# Working branch in each .src/<repo> for the Cedar+Kumo integration.
WORK_BRANCH = "cedar"

# Path to the Kumo+Orange variant of the multitenant frontend.
# Sibling to the original `web/`, which we leave untouched as the
# visual baseline / reference implementation.
MULTITENANT_WEB = ".src/example-multitenant-worker/web-kumo"

# Path to the multitenant worker (rust + wrangler.toml live here).
MULTITENANT_WORKER = ".src/example-multitenant-worker"

# Better Rust diagnostics during dev.
RUST_BACKTRACE = "1"


# =============================================================================
# mise:* — bootstrap
# =============================================================================

[tasks."mise:install"]
description = "Install all CLI tools defined in mise.toml"
shell = "nu -c"
run = "mise install"


# =============================================================================
# cargo:* — Rust dev loop (all noun:verb)
# =============================================================================

[tasks."cargo:check"]
description = "cargo check against the wasm32 target"
shell = "nu -c"
run = "cargo check --target $env.WASM_TARGET"

[tasks."cargo:build"]
description = "Build the library (debug, fast iteration)"
shell = "nu -c"
run = "cargo build --target $env.WASM_TARGET"

[tasks."cargo:build:release"]
description = "Build the library (release, optimized for Workers)"
shell = "nu -c"
run = "cargo build --target $env.WASM_TARGET --release"

[tasks."cargo:test"]
description = "Run tests on native target (library is target-agnostic)"
shell = "nu -c"
run = "cargo test"

[tasks."cargo:lint"]
description = "Lint with clippy (deny warnings)"
shell = "nu -c"
run = "cargo clippy --target $env.WASM_TARGET --all-targets -- -D warnings"

[tasks."cargo:format"]
description = "Format code with rustfmt"
shell = "nu -c"
run = "cargo fmt --all"

[tasks."cargo:fix"]
description = "Auto-fix: rustfmt + clippy --fix"
shell = "nu -c"
run = """
cargo fmt --all
cargo clippy --target $env.WASM_TARGET --all-targets --fix --allow-dirty --allow-staged -- -D warnings
"""

[tasks."cargo:watch"]
description = "Watch loop: bacon runs check/clippy/test on change"
shell = "nu -c"
run = "bacon"

[tasks."cargo:machete"]
description = "Find unused dependencies (matters for wasm binary size)"
shell = "nu -c"
run = "cargo machete"

[tasks."cargo:expand"]
description = "Show macro-expanded output (debug connectrpc-build codegen)"
shell = "nu -c"
run = "cargo expand"

[tasks."cargo:clean"]
description = "Remove target/ and any wasm artifacts"
shell = "nu -c"
run = """
rm -rf target
print "Cleaned target/"
"""

[tasks."cargo:pre-commit"]
description = "Quality gate: cargo:format + cargo:lint + cargo:test + cargo:machete"
depends = ["cargo:format", "cargo:lint", "cargo:test", "cargo:machete"]
shell = "nu -c"
run = "print 'pre-commit checks passed'"


# =============================================================================
# cedar:* — Cedar policy workflow
# =============================================================================

[tasks."cedar:validate"]
description = "Run `cedar validate` on every examples/*-policies/ tree (schema + each policy file)"
shell = "nu -c"
run = """
let dirs = (glob examples/*-policies)
if ($dirs | is-empty) {
  print "no examples/*-policies/ dirs yet — skipping"
  exit 0
}
for dir in $dirs {
  let schemas = (glob $"($dir)/*.cedarschema")
  if ($schemas | is-empty) {
    print $"($dir): no .cedarschema — skipping"
    continue
  }
  let schema = ($schemas | first)
  cedar check-parse --schema $schema
  for policy in (glob $"($dir)/policies/*.cedar") {
    print $"validate ($policy | path basename)"
    cedar validate --schema $schema --policies $policy
  }
  print $"($dir | path basename): OK"
}
"""

[tasks."cedar:format"]
description = "Format every examples/*-policies/policies/*.cedar file in place"
shell = "nu -c"
run = """
for policy in (glob examples/*-policies/policies/*.cedar) {
  cedar format --policies $policy --write
}
"""


# =============================================================================
# kumo:* — Kumo UI frontend helpers (for consumer examples)
# =============================================================================

# =============================================================================
# worker:* — run the multitenant rust worker locally via wrangler
# =============================================================================

[tasks."worker:d1-migrate"]
description = "Apply D1 migrations to the local Workers SQLite simulator"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WORKER
wrangler d1 migrations apply DB --local
"""

[tasks."worker:dev"]
description = "Run the multitenant worker (wrangler dev, HTTPS, serves web-kumo/dist)"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WORKER
wrangler dev --local-protocol=https --port=8787
"""


# =============================================================================
# dev:* — process supervision (pitchfork) for long-running daemons
# Config lives in pitchfork.toml at the project root.
# =============================================================================

[tasks."dev:up"]
description = "Start worker + web (pitchfork daemons), keep them alive"
shell = "nu -c"
run = "pitchfork start -l -f"

[tasks."dev:down"]
description = "Stop worker + web daemons"
shell = "nu -c"
run = "pitchfork stop worker web"

[tasks."dev:status"]
description = "Show running pitchfork daemons"
shell = "nu -c"
run = "pitchfork list"

[tasks."dev:logs"]
description = "Tail combined logs for worker + web"
shell = "nu -c"
run = "pitchfork logs worker web"

[tasks."dev:tui"]
description = "Pitchfork's interactive TUI dashboard"
shell = "nu -c"
run = "pitchfork tui"


# =============================================================================
# kumo:* — Kumo UI work in the multitenant fork's web-kumo/
# =============================================================================

[tasks."kumo:web-install"]
description = "Install Kumo + Tailwind into the multitenant web/ (pnpm)"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WEB
pnpm add -D @cloudflare/kumo tailwindcss postcss autoprefixer
pnpm add @phosphor-icons/react
"""

[tasks."kumo:web-init"]
description = "Run `kumo init` in multitenant web/ (creates kumo.json)"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WEB
pnpm exec kumo init
"""

[tasks."kumo:web-dev"]
description = "Vite dev server in multitenant web/"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WEB
pnpm dev
"""

[tasks."kumo:web-build"]
description = "Build the multitenant web/ for production"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WEB
pnpm build
"""

[tasks."kumo:list-blocks"]
description = "List available Kumo blocks (catalog from registry)"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WEB
pnpm exec kumo blocks
"""

[tasks."kumo:list-components"]
description = "List Kumo blocks already installed in src/components/kumo/"
shell = "nu -c"
run = """
cd $env.MULTITENANT_WEB
pnpm exec kumo ls
"""

[tasks."kumo:add-block"]
description = "Copy a Kumo block's source into src/components/kumo/. Usage: mise run kumo:add-block -- <BlockName>"
shell = "nu -c"
usage = '''
arg "block" help="Block name (e.g. PageHeader, ResourceListPage, DeleteResource). Run kumo:list-blocks to see what's available."
'''
run = """
cd $env.MULTITENANT_WEB
pnpm exec kumo add $env.usage_block
"""

[tasks."kumo:doc"]
description = "Show docs for a Kumo component. Usage: mise run kumo:doc -- <ComponentName>"
shell = "nu -c"
usage = '''
arg "component" help="Component name (e.g. Button, Sidebar, Table)"
'''
run = """
cd $env.MULTITENANT_WEB
pnpm exec kumo doc $env.usage_component
"""


# =============================================================================
# src:* — .src/ workspace of upstream example repos
# UPSTREAM env var (above) controls the owner. Flip to your fork for Phase 2.
# =============================================================================

[tasks."src:clone"]
description = "Clone the three reference example repos into .src/"
shell = "nu -c"
run = """
mkdir .src
let repos = [
  "connectrpc-workers",
  "example-multitenant-worker",
  "example-connectrpc-worker",
]
for name in $repos {
  let dest = $".src/($name)"
  if ($dest | path exists) {
    print $"($name): already cloned, skipping"
  } else {
    git clone $"https://github.com/($env.UPSTREAM)/($name).git" $dest
  }
}
"""

[tasks."src:update"]
description = "git pull --ff-only each repo in .src/"
shell = "nu -c"
run = """
for repo in (ls .src | where type == dir | get name) {
  print $"=== ($repo) ==="
  git -C $repo pull --ff-only
}
"""

[tasks."src:show-status"]
description = "git status -sb across each repo in .src/"
shell = "nu -c"
run = """
for repo in (ls .src | where type == dir | get name) {
  print $"=== ($repo) ==="
  git -C $repo status -sb
}
"""

[tasks."src:fork"]
description = "Fork each upstream repo under $FORK; rewrite remotes (origin=fork, upstream=$UPSTREAM); push main"
shell = "nu -c"
run = """
for entry in (ls .src | where type == dir) {
  let path = $entry.name
  let repo = ($path | path basename)
  let upstream_slug = $"($env.UPSTREAM)/($repo)"
  let fork_url = $"https://github.com/($env.FORK)/($repo).git"

  print $"=== ($repo) ==="

  # 1. Create the fork on GitHub (idempotent — gh handles 'already forked').
  gh repo fork $upstream_slug --clone=false

  # 2. Rename existing origin → upstream (if not done already).
  let remotes = (git -C $path remote | lines)
  if not ("upstream" in $remotes) {
    git -C $path remote rename origin upstream
  }

  # 3. Point origin at our fork (set-url if exists, add if not).
  let remotes = (git -C $path remote | lines)
  if ("origin" in $remotes) {
    git -C $path remote set-url origin $fork_url
  } else {
    git -C $path remote add origin $fork_url
  }

  # 4. Seed the fork with main.
  git -C $path push -u origin main

  print "remotes:"
  git -C $path remote -v
}
"""

[tasks."src:reset"]
description = "Nuke .src/ and re-clone (useful when a patch goes sideways). Re-run src:fork after."
shell = "nu -c"
run = """
rm -rf .src
mise run src:clone
"""

[tasks."src:create-branch"]
description = "Create $WORK_BRANCH in each .src/<repo> (if not already there)"
shell = "nu -c"
run = """
let branch = $env.WORK_BRANCH
for entry in (ls .src | where type == dir) {
  let path = $entry.name
  let repo = ($path | path basename)
  print $"=== ($repo) ==="
  let current = (git -C $path branch --show-current | str trim)
  if ($current == $branch) {
    print $"already on ($branch)"
  } else {
    let branches = (git -C $path branch | lines | each { str trim --left --char '*' } | each { str trim })
    if ($branch in $branches) {
      git -C $path checkout $branch
    } else {
      git -C $path checkout -b $branch
    }
  }
}
"""
