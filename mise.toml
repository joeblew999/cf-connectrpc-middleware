[tools]
rust = "stable"
node = "latest"
"aqua:nushell/nushell" = "latest"

# Cloudflare Workers CLI: dev server + deploys. Drives worker-build.
# Note: `buf` is intentionally NOT here. protoc IS (below) — connectrpc-build
# 0.6 shells out to it for codegen.
"npm:wrangler" = "latest"

# protoc — REQUIRED by connectrpc-build 0.6's build.rs codegen (it shells
# out to `protoc`). connectrpc-build 0.4 used a pure-Rust path and needed
# no external tool; 0.6 reintroduced the protoc dependency. Without this
# the example worker's build.rs panics: "protoc failed: No version is set
# for shim: protoc". (protoc is the compiler; `buf` is the wrapper we still
# avoid — Rust uses connectrpc-build, TS uses npm-local @bufbuild/buf.)
"aqua:protocolbuffers/protobuf/protoc" = "35.0"

# Frontend (consumer examples). Kumo UI for the Orange theme.
"npm:@cloudflare/kumo" = "latest"

# aube — fast pnpm/npm replacement by jdx (the mise author): aube/aubr/aubx.
# Reads the existing pnpm-lock (no migration). The kit:* tasks use it.
"aqua:jdx/aube" = "latest"

# Cedar policy CLI (validate / authorize / format). Matches runtime cedar-policy = "4".
"cargo:cedar-policy-cli" = "4.11.0"

# NOTE: cedar-language-server and cedar-policy-mcp-schema-generator are
# NOT here. Neither is published to crates.io (cargo install 404s) — both
# live only inside Cedar's git workspaces (cedar/, cedar-for-agents/) as
# workspace members. mise's `cargo:` backend can't select a single member
# from a git workspace, so they're built by the `cedar:tools` task with an
# explicit `cargo install --git <url> --rev <hash> <crate>`. The binaries
# land in {{config_root}}/.tools/bin, which `[env] _.path` puts on PATH.

# NOTE: worker-build is NOT pinned here. Rust on this stack is rustup-managed
# (RUSTUP_HOME=~/.rustup; ~/.cargo/bin is the toolchain home and stays first on
# PATH), and wrangler's wrangler.toml `[build]` command already does
# `cargo install worker-build@^0.8` into ~/.cargo/bin. A mise `cargo:worker-build`
# pin would just be shadowed by that copy — confusing, never used. Let the rust
# toolchain own it.

# Dev-quality tools: unused deps, macro expansion (for connectrpc-build debugging).
"cargo:cargo-machete" = "latest"
"cargo:cargo-expand" = "latest"


[env]
# Repo-local bin dir for tools we `cargo install` from git (cedar
# language-server + mcp-schema-generator — see `cedar:tools`). Gitignored.
# Put first so these win over any stale ~/.cargo/bin copies.
_.path = ["{{config_root}}/.tools/bin"]

# Single source of truth for the wasm target. Used by every cargo:* task.
WASM_TARGET = "wasm32-unknown-unknown"

# Original upstream owner of the example repos. .src/<repo> has a
# remote called `upstream` pointing here (read-only — for pulling
# updates).
UPSTREAM = "connyay"

# Your fork owner. .src/<repo> has remote `origin` pointing here
# (push target). Used by `src:fork` and `src:clone`.
FORK = "joeblew999"

# Working branch in each .src/<repo> for the Cedar+Kumo integration.
WORK_BRANCH = "cedar"

# Better Rust diagnostics during dev.
RUST_BACKTRACE = "1"

# Cedar "for agents" repo — source of the analysis MCP server, which
# upstream ships Docker-only (no npm registry build). `cedar:mcp:install`
# clones it here (gitignored, like the other .src/ clones) and builds the
# TS server with the mise-managed node toolchain. CEDAR_AGENTS_REPO is on
# the cedar-policy org, NOT $FORK/$UPSTREAM — so it's cloned directly, not
# via the src:* fork workflow.
CEDAR_AGENTS_REPO = "cedar-policy/cedar-for-agents"
CEDAR_AGENTS_DIR = ".src/cedar-for-agents"
# Subdir holding the analysis MCP server (package.json bin `mcp` →
# dist/server.js). Built by `cedar:mcp:install`, pointed at by `cedar:mcp:config`.
CEDAR_MCP_DIR = ".src/cedar-for-agents/js/cedar-analysis-mcp-server/mcp"


# ── TASK MAP ─────────────────────────────────────────────────────────
# The lean task set, grouped by intent. "when" = reach for it when you're…
#
#  cargo:*    when working the middleware dev loop — check / build / test /
#             lint / fmt the crates/* tower middleware (native + wasm worker).
#  cedar:*    when touching Cedar policies — validate / format / test the
#             policy trees, plus the LSP / VS Code / analysis-MCP tooling.
#  kit:*      when developing the Kumo+ConnectRPC client kit at
#             packages/kumo-connectrpc-kit — install / typecheck / build /
#             test / publish to JSR.
#  example:*  when running the rauthy-cedar reference (examples/rauthy-cedar):
#             check  = build native + wasm worker + wasm gateway
#             test   = crate tests + Cedar policy proof (offline)
#             server = run + prove the native hyper host (Rauthy in Docker)
#             worker = run + prove the single CF Worker host (wrangler dev)
#             gateway= run + prove the multi-Worker gateway host
#  src:*      when (re)syncing pinned upstream source under .src/ —
#             clone / sync / check the foundation deps so READ == COMPILE.
#  stack:* deploy:*  when bringing the whole Rauthy+Cedar auth stack up
#             locally (stack:local) or deploying it (deploy:stack).
# ─────────────────────────────────────────────────────────────────────


# =============================================================================
# mise:* — bootstrap
# =============================================================================

[tasks."mise:install"]
description = "Install all CLI tools defined in mise.toml"
shell = "nu -c"
run = "mise install"


# =============================================================================
# cargo:* — Rust dev loop (all noun:verb)
# =============================================================================

[tasks."cargo:check"]
description = "Check the whole MIXED workspace: native (incl. the native-only rauthy-cedar-server) + the wasm32 worker (the real wasm proof for the middleware)"
shell = "nu -c"
run = """
# The workspace is now MIXED: the crates/* middleware + the rauthy-cedar app
# are target-agnostic, but rauthy-cedar-server is NATIVE-ONLY (hyper/tokio-net
# → mio, which emits compile_error! on wasm32). So we can't `--target wasm32`
# the whole workspace anymore. Instead:
#   1. native `--workspace` covers everything, including the server.
#   2. the wasm worker (a separate workspace) transitively compiles the whole
#      middleware stack on wasm32 — that's the genuine wasm proof.
cargo check --workspace
cargo check --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml
# The multi-Worker gateway (front door → backend over a [[services]] binding)
# is a third standalone wasm workspace — check it on wasm32 too.
cargo check --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/gateway/Cargo.toml
"""

[tasks."cargo:build"]
description = "Build the whole MIXED workspace: native (incl. rauthy-cedar-server) + the wasm32 worker (debug, fast iteration)"
shell = "nu -c"
run = """
# See cargo:check for why this is native-workspace + wasm-worker, not a single
# `--target wasm32` across the workspace.
cargo build --workspace
cargo build --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml
cargo build --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/gateway/Cargo.toml
"""

[tasks."cargo:build:release"]
description = "Build release: native workspace (incl. rauthy-cedar-server) + the wasm32 worker, optimized for Workers"
shell = "nu -c"
run = """
# Same mixed-workspace split as cargo:build (the whole-workspace wasm32 build
# can't compile the native-only server). The wasm worker carries the Worker
# release profile (opt-level=z, lto) in its own Cargo.toml.
cargo build --workspace --release
cargo build --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml --release
cargo build --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/gateway/Cargo.toml --release
"""

[tasks."cargo:test"]
description = "Run tests on native target (library is target-agnostic)"
shell = "nu -c"
run = "cargo test"

[tasks."cargo:lint"]
description = "Lint the whole MIXED workspace with clippy (deny warnings): native --all-targets (incl. rauthy-cedar-server) + the wasm32 worker"
shell = "nu -c"
run = """
# Native workspace (covers the native-only server + all test targets) AND the
# wasm worker on wasm32 (the middleware's real wasm lint surface). See
# cargo:check for the mixed-workspace rationale.
cargo clippy --workspace --all-targets -- -D warnings
cargo clippy --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml -- -D warnings
# The multi-Worker gateway is a third standalone wasm workspace — lint it too.
cargo clippy --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/gateway/Cargo.toml -- -D warnings
"""

[tasks."cargo:format"]
description = "Format code with rustfmt"
shell = "nu -c"
run = "cargo fmt --all"

[tasks."cargo:fix"]
description = "Auto-fix: rustfmt + clippy --fix"
shell = "nu -c"
run = """
cargo fmt --all
# Mixed workspace: native --all-targets covers everything (incl. the
# native-only server); the worker is fixed on wasm32 separately.
cargo clippy --workspace --all-targets --fix --allow-dirty --allow-staged -- -D warnings
cargo clippy --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml --fix --allow-dirty --allow-staged -- -D warnings
"""

[tasks."cargo:watch"]
description = "Watch loop: bacon runs check/clippy/test on change"
shell = "nu -c"
run = "bacon"

[tasks."cargo:machete"]
description = "Find unused dependencies (matters for wasm binary size)"
shell = "nu -c"
run = "cargo machete"

[tasks."cargo:expand"]
description = "Show macro-expanded output for a crate (debug connectrpc-build codegen). Defaults to rauthy-cedar-app, where include_generated!() lives. Usage: mise run cargo:expand -- [crate]"
shell = "nu -c"
usage = '''
arg "crate" help="Package to expand (default: rauthy-cedar-app, the include_generated! site)" default="rauthy-cedar-app"
'''
# The workspace root is a virtual manifest, so `cargo expand` needs an explicit
# package. Default to the app that actually invokes the codegen macro.
run = "cargo expand -p $env.usage_crate"

[tasks."cargo:clean"]
description = "Remove target/ and any wasm artifacts"
shell = "nu -c"
run = """
rm -rf target
print "Cleaned target/"
"""

[tasks."cargo:pre-commit"]
description = "Quality gate: cargo:format + cargo:lint + cargo:test + cargo:machete"
depends = ["cargo:format", "cargo:lint", "cargo:test", "cargo:machete"]
shell = "nu -c"
run = "print 'pre-commit checks passed'"


# =============================================================================
# cedar:* — Cedar policy workflow
# =============================================================================

[tasks."cedar:validate"]
description = "Run `cedar validate` on every Cedar policy dir: the examples/*-policies/ trees AND the rauthy-cedar example's own app/policies/ (the policies it actually runs)"
shell = "nu -c"
run = """
# Two layouts: the standalone examples/*-policies/ trees (schema beside a
# policies/ subdir) and the rauthy-cedar example, whose schema + policies sit
# together in app/policies/ — both are validated so `mise run cedar:validate`
# covers the policies the running example loads via include_str!.
let standalone = (glob examples/*-policies | each {|dir|
  { schema_glob: $"($dir)/*.cedarschema", policy_glob: $"($dir)/policies/*.cedar", name: ($dir | path basename) }
})
let inline = (glob examples/*/app/policies | each {|dir|
  { schema_glob: $"($dir)/*.cedarschema", policy_glob: $"($dir)/*.cedar", name: ($dir | path dirname | path dirname | path basename) }
})
let trees = ($standalone | append $inline)
if ($trees | is-empty) {
  print "no Cedar policy dirs found — skipping"
  exit 0
}
for tree in $trees {
  let schemas = (glob $tree.schema_glob)
  if ($schemas | is-empty) {
    print $"($tree.name): no .cedarschema — skipping"
    continue
  }
  let schema = ($schemas | first)
  cedar check-parse --schema $schema
  for policy in (glob $tree.policy_glob) {
    print $"validate ($tree.name)/($policy | path basename)"
    cedar validate --schema $schema --policies $policy
  }
  print $"($tree.name): OK"
}
"""

[tasks."cedar:format"]
description = "Format every Cedar policy file in place: examples/*-policies/policies/ AND the rauthy-cedar example's app/policies/"
shell = "nu -c"
run = """
let files = (glob examples/*-policies/policies/*.cedar | append (glob examples/*/app/policies/*.cedar))
for policy in $files {
  cedar format --policies $policy --write
}
"""

[tasks."cedar:test"]
description = "Run cedar authorize against representative requests for every examples/*-policies/tests/run.nu found. Non-zero exit on any mismatch."
shell = "nu -c"
run = """
let runners = (glob examples/*-policies/tests/run.nu)
if ($runners | is-empty) {
  print "no examples/*-policies/tests/run.nu — skipping"
  exit 0
}
for runner in $runners {
  let dir = ($runner | path dirname | path dirname)
  print $"── ($dir | path basename) ──"
  cd $dir
  nu tests/run.nu
  cd -
}
"""


# =============================================================================
# example:* — THIS repo's real reference example (examples/rauthy-cedar):
# the crates/* middleware proven on a real connectrpc + buffa service,
# running native AND on a Cloudflare Worker from one shared app.
# =============================================================================

[tasks."example:check"]
description = "Build the rauthy-cedar example three ways: native server + wasm backend worker + wasm gateway worker"
shell = "nu -c"
run = """
cargo check -p rauthy-cedar-app -p rauthy-cedar-server
cargo check --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/worker/Cargo.toml
cargo check --target $env.WASM_TARGET --manifest-path examples/rauthy-cedar/gateway/Cargo.toml
"""

[tasks."example:test"]
description = "Test the rauthy-cedar example: crate tests + the Cedar policy proof (no external deps)"
shell = "nu -c"
run = """
cargo test -p rauthy-cedar-app -p rauthy-cedar-server
nu examples/rauthy-cedar/tests/run.nu
"""

[tasks."example:server"]
description = "Run + prove the rauthy-cedar NATIVE server host: boots Rauthy in Docker, mints a token, runs the native hyper server, asserts the oidc→cedar cases (needs a Docker daemon)"
shell = "nu -c"
run = "nu examples/rauthy-cedar/server/serve.nu"

[tasks."example:worker"]
description = "Run + prove the rauthy-cedar single CF Worker host: boots Rauthy in Docker, mints a token, runs the backend (api) Worker via wrangler dev, asserts the oidc→cedar cases + gRPC reflection (needs Docker + wrangler)"
shell = "nu -c"
run = "nu examples/rauthy-cedar/worker/serve.nu"

[tasks."example:gateway"]
description = "Run + prove the rauthy-cedar multi-Worker gateway host: boots Rauthy, runs BOTH workers in one wrangler dev (gateway primary + api auxiliary via [[services]] binding), mints a token, asserts gateway ProxyRead → service binding → backend OIDC+Cedar (200 w/ token, 401 propagated w/o) (needs Docker + wrangler)"
shell = "nu -c"
run = "nu examples/rauthy-cedar/gateway/serve.nu"


# =============================================================================
# kit:* — KUMO KIT — build/test/publish the Kumo+ConnectRPC client kit at
# packages/kumo-connectrpc-kit. These root tasks delegate into the kit dir;
# they mirror packages/kumo-connectrpc-kit/mise.toml so the pillar is visible
# from the repo root. JSR doesn't transpile JSX, so the kit is PRE-BUILT (tsc)
# to dist/ and the compiled .js + .d.ts are published.
# =============================================================================

[tasks."kit:install"]
description = "Install the kit's peer/dev deps (react, @cloudflare/kumo, @connectrpc/*) via aube"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
aube install
"""

[tasks."kit:typecheck"]
description = "Type-check the kit (tsc --noEmit)"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
aubr typecheck
"""

[tasks."kit:build"]
description = "Compile the kit's src/*.{ts,tsx} → dist/*.js + *.d.ts (JSX compiled; JSR won't)"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
aubr build
"""

[tasks."kit:test"]
description = "Run the kit's test suite (vitest run)"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
aubr test
"""

[tasks."kit:jsr-check"]
description = "JSR dry-run on the kit (slow-types, packaging) — no publish"
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
aubx jsr publish --dry-run --allow-dirty
"""

[tasks."kit:jsr-publish"]
description = "Publish the kit to JSR. Normally CI does this on push (OIDC); this is the manual path."
shell = "nu -c"
run = """
cd packages/kumo-connectrpc-kit
aubx jsr publish
"""


# =============================================================================
# src:* — .src/ workspace of upstream example repos
# UPSTREAM env var (above) controls the owner. Flip to your fork for Phase 2.
# =============================================================================

[tasks."src:clone"]
description = "Clone the three reference example repos into .src/"
shell = "nu -c"
run = """
mkdir .src
let repos = [
  "connectrpc-workers",
  "example-multitenant-worker",
  "example-connectrpc-worker",
]
for name in $repos {
  let dest = $".src/($name)"
  if ($dest | path exists) {
    print $"($name): already cloned, skipping"
  } else {
    git clone $"https://github.com/($env.UPSTREAM)/($name).git" $dest
  }
}
"""

[tasks."src:update"]
description = "git pull --ff-only each repo in .src/"
shell = "nu -c"
run = """
for repo in (ls .src | where type == dir | get name) {
  print $"=== ($repo) ==="
  git -C $repo pull --ff-only
}
"""

[tasks."src:show-status"]
description = "git status -sb across each repo in .src/"
shell = "nu -c"
run = """
for repo in (ls .src | where type == dir | get name) {
  print $"=== ($repo) ==="
  git -C $repo status -sb
}
"""

# STALENESS GUARD. `.src/` clones are snapshots and go stale — this fetches
# each clone's remotes and reports how many commits behind its tracked branch
# it is, plus the connectrpc pin the clone currently holds. A non-zero
# "behind" means DO NOT trust this clone for version facts — refresh it
# (`mise run src:update`) or check upstream `main` directly.
[tasks."src:check"]
description = "Verify .src/ clones: tag-deps match Cargo.lock; fork clones report commits-behind (staleness guard)"
shell = "nu -c"
run = """
# Pinned foundation source (managed by src:sync):
#  tagdeps = checked out at v<Cargo.lock version>;  refdeps = at a fixed commit.
let tagdeps = { "connect-rust": "connectrpc", "buffa": "buffa" }
let refdeps = { "connectrpc-workers": "a366077" }
let lock = (open Cargo.lock | from toml)
for repo in (ls .src | where type == dir | get name) {
  let name = ($repo | path basename)
  print $"=== ($name) ==="
  git -C $repo fetch --quiet --all
  if ($name in ($tagdeps | columns)) {
    # Tag-pinned dep: the clone MUST sit at the tag matching our locked version.
    let crate = ($tagdeps | get $name)
    let want = $"v(($lock.package | where name == $crate | get version | first))"
    let have = (do { git -C $repo describe --tags --exact-match } | complete | get stdout | str trim)
    let flag = (if $have == $want { $"on ($have) = Cargo.lock ✓" } else { $"⚠️  on '($have)' but Cargo.lock wants ($want) — run `mise run src:sync`" })
    print $"  ($flag)"
  } else if ($name in ($refdeps | columns)) {
    # Commit-pinned dep (no release tag for the version we need).
    let want = ($refdeps | get $name)
    let have = (do { git -C $repo rev-parse --short HEAD } | complete | get stdout | str trim)
    let flag = (if $have == $want { $"on ($have) = pinned commit ✓ — no 0.7 tag yet" } else { $"⚠️  on ($have) but pinned to ($want) — run `mise run src:sync`" })
    print $"  ($flag)"
  } else {
    # Fork / reference clone: report commits-behind its tracked upstream branch.
    let remotes = (git -C $repo remote | lines)
    let ref = (if ("upstream" in $remotes) { "upstream/main" } else { "origin/main" })
    let behind = (do { git -C $repo rev-list --count $"HEAD..($ref)" } | complete)
    if $behind.exit_code == 0 {
      let n = ($behind.stdout | str trim)
      let flag = (if $n == "0" { "up to date" } else { $"⚠️  ($n) commits BEHIND ($ref) — STALE, do not trust for versions" })
      print $"  ($flag)"
    } else {
      print $"  (could not compare against ($ref))"
    }
    let cargo = $"($repo)/Cargo.toml"
    if ($cargo | path exists) {
      let pins = (open --raw $cargo | lines | where ($it =~ '^\\s*connectrpc\\s*=') )
      if ($pins | is-not-empty) { print $"  connectrpc pin in clone: ($pins | first | str trim)" }
    }
  }
}
print ""
print "tag-deps (connectrpc/buffa) = read-only source matching our pins (src:sync)."
print "fork/reference clones drift — verify upstream main, not the clone."
"""

# PER-TAG dependency source. The crate deps we PIN (connectrpc, buffa) get a
# read-only `.src/` clone checked out at the git tag matching our Cargo.lock
# version — so the source we READ is EXACTLY the version we COMPILE against
# (can't be stale, can't drift ahead). Re-run after any Cargo bump to move the
# clones to the new tag. These are distinct from the connyay FORK clones
# (working `cedar` branch) which track upstream via src:check.
[tasks."src:sync"]
description = "Pin the foundation source clones: connectrpc+buffa at the Cargo.lock tag; connectrpc-workers at a commit (no 0.7 tag yet)"
shell = "nu -c"
run = """
# Tier A1 — tag-derived: tag = v<version-in-Cargo.lock>. Repo-wide vX.Y.Z scheme.
let lockdeps = [
  { repo: "anthropics/connect-rust", crate: "connectrpc" }
  { repo: "anthropics/buffa",        crate: "buffa" }
]
# Tier A2 — ref-pinned: deps NOT in our Cargo.lock (no crate to derive from),
# OR that have no release tag for the version we need. connectrpc-workers' 0.7
# code is main-only (newest tag v0.3.1 is connectrpc 0.6) → pin the commit.
# Switch `ref` to a tag once connectrpc-workers cuts a 0.7 release.
let refdeps = [
  { repo: "connyay/connectrpc-workers", ref: "a366077" }
]
let lock = (open Cargo.lock | from toml)
for d in $lockdeps {
  let dir = $".src/($d.repo | path basename)"
  let ver = ($lock.package | where name == $d.crate | get version | first)
  let want = $"v($ver)"
  if not ($dir | path exists) { print $"cloning ($d.repo)"; git clone --quiet $"https://github.com/($d.repo).git" $dir }
  git -C $dir fetch --quiet --tags
  let co = (do { git -C $dir checkout --quiet $want } | complete)
  if $co.exit_code == 0 { print $"  ($d.crate) ($ver) → @ ($want) ✓" } else { print $"  ⚠️  ($d.crate): tag ($want) missing — check tag scheme" }
}
for d in $refdeps {
  let dir = $".src/($d.repo | path basename)"
  if not ($dir | path exists) { print $"cloning ($d.repo)"; git clone --quiet $"https://github.com/($d.repo).git" $dir }
  git -C $dir fetch --quiet --all
  let co = (do { git -C $dir checkout --quiet $d.ref } | complete)
  if $co.exit_code == 0 { print $"  ($d.repo | path basename) → @ ($d.ref) — commit-pin, no 0.7 tag yet ✓" } else { print $"  ⚠️  ($d.repo | path basename): ref ($d.ref) missing" }
}
print ""
print "READ-ONLY source matching our pins. connectrpc-workers is commit-pinned"
print "until it releases 0.7 — then switch its `ref` to the tag."
"""

[tasks."src:fork"]
description = "Fork each upstream repo under $FORK; rewrite remotes (origin=fork, upstream=$UPSTREAM); push main"
shell = "nu -c"
run = """
for entry in (ls .src | where type == dir) {
  let path = $entry.name
  let repo = ($path | path basename)
  let upstream_slug = $"($env.UPSTREAM)/($repo)"
  let fork_url = $"https://github.com/($env.FORK)/($repo).git"

  print $"=== ($repo) ==="

  # 1. Create the fork on GitHub (idempotent — gh handles 'already forked').
  gh repo fork $upstream_slug --clone=false

  # 2. Rename existing origin → upstream (if not done already).
  let remotes = (git -C $path remote | lines)
  if not ("upstream" in $remotes) {
    git -C $path remote rename origin upstream
  }

  # 3. Point origin at our fork (set-url if exists, add if not).
  let remotes = (git -C $path remote | lines)
  if ("origin" in $remotes) {
    git -C $path remote set-url origin $fork_url
  } else {
    git -C $path remote add origin $fork_url
  }

  # 4. Seed the fork with main.
  git -C $path push -u origin main

  print "remotes:"
  git -C $path remote -v
}
"""

[tasks."src:reset"]
description = "Nuke .src/ and re-clone (useful when a patch goes sideways). Re-run src:fork after."
shell = "nu -c"
run = """
rm -rf .src
mise run src:clone
"""

[tasks."src:create-branch"]
description = "Create $WORK_BRANCH in each .src/<repo> (if not already there)"
shell = "nu -c"
run = """
let branch = $env.WORK_BRANCH
for entry in (ls .src | where type == dir) {
  let path = $entry.name
  let repo = ($path | path basename)
  print $"=== ($repo) ==="
  let current = (git -C $path branch --show-current | str trim)
  if ($current == $branch) {
    print $"already on ($branch)"
  } else {
    let branches = (git -C $path branch | lines | each { str trim --left --char '*' } | each { str trim })
    if ($branch in $branches) {
      git -C $path checkout $branch
    } else {
      git -C $path checkout -b $branch
    }
  }
}
"""


# ─────────────────────────────────────────────────────────────────────
# cedar:* — GUI / MCP tooling (extends cedar:validate/format/test above)
#
# Sourcing: cedar-language-server + cedar-policy-mcp-schema-generator are
# `cargo install` registry tools pinned in [tools] (mise installs them on
# `mise install`). The analysis MCP server is upstream Docker-only, so it's
# built from source by cedar:mcp:install. graphviz `dot` is NOT in mise's
# registry and is not assumed present — cedar:viz always emits .dot and only
# renders .svg when a `dot` happens to be on PATH.
# ─────────────────────────────────────────────────────────────────────

[tasks."cedar:tools"]
description = "Build the git-only Cedar binaries (cedar-language-server + cedar-policy-mcp-schema-generator) into .tools/bin via `cargo install --git --rev` pinned to exact commits. Idempotent — skips if already built. Run once after clone (and re-run after bumping the pins). Prereq for cedar:lsp and cedar:schema:from-mcp."
shell = "nu -c"
run = """
let bin = ".tools/bin"
mkdir $bin
# cedar-language-server (LSP) — a workspace member of cedar/, pinned commit.
if (($bin | path join "cedar-language-server") | path exists) {
  print "cedar-language-server: already built (.tools/bin)"
} else {
  print "building cedar-language-server — compiles cedar core, a few minutes..."
  cargo install --git https://github.com/cedar-policy/cedar --rev 92b97a45c091bb285b997664bf14bfffd8c402cc cedar-language-server --root .tools --locked
}
# cedar-policy-mcp-schema-generator — workspace member of cedar-for-agents/, cli feature.
if (($bin | path join "cedar-policy-mcp-schema-generator") | path exists) {
  print "cedar-policy-mcp-schema-generator: already built (.tools/bin)"
} else {
  print "building cedar-policy-mcp-schema-generator..."
  cargo install --git https://github.com/cedar-policy/cedar-for-agents --rev 5d3ade51dc1148bbf44d5acb90399defd13e604e cedar-policy-mcp-schema-generator --features cli --root .tools --locked
}
print ""
print "done — binaries in .tools/bin (on PATH via [env] _.path). verify: cedar-language-server --help"
"""

[tasks."cedar:viz"]
description = "Render the entity graph for each examples/*-policies/tests/entities.json to <dir>/entities.dot (graphviz). Also writes entities.svg if `dot` is on PATH."
shell = "nu -c"
run = """
let entity_files = (glob examples/*-policies/tests/entities.json)
if ($entity_files | is-empty) {
  print "no examples/*-policies/tests/entities.json — skipping"
  exit 0
}
let has_dot = ((which dot | length) > 0)
if (not $has_dot) {
  print "note: `dot` not on PATH (graphviz isn't in mise's registry) — writing .dot only."
  print "      to get SVGs: install graphviz, or render the .dot at https://dreampuf.github.io/GraphvizOnline"
}
for ef in $entity_files {
  let dir = ($ef | path dirname | path dirname)
  let name = ($dir | path basename)
  let dot = $"($dir)/entities.dot"
  cedar visualize --entities $ef out> $dot
  print $"($name): wrote ($dot)"
  if $has_dot {
    let svg = $"($dir)/entities.svg"
    dot -Tsvg $dot out> $svg
    print $"($name): wrote ($svg)"
  }
}
"""

[tasks."cedar:lsp"]
description = "Launch cedar-language-server over stdio. Editors (Neovim/Helix) that spawn an LSP by command point here; VS Code users want the extension instead (see .vscode/extensions.json)."
shell = "nu -c"
run = "cedar-language-server"

[tasks."cedar:vscode"]
description = "Install the official Cedar VS Code extension (cedar-policy.vscode-cedar) into your editor. Companion to .vscode/extensions.json (which recommends it) and cedar:lsp (the language server it bundles)."
shell = "nu -c"
run = """
# Installs https://github.com/cedar-policy/vscode-cedar
# (marketplace id `cedar-policy.vscode-cedar`). Tries the VS Code-family
# editor CLIs in order; --force makes it idempotent (install or update).
let ext = "cedar-policy.vscode-cedar"
mut cli = ""
for c in [code cursor codium code-insiders] {
  if (which $c | is-not-empty) { $cli = $c; break }
}
if ($cli == "") {
  print "No VS Code-family CLI on PATH (tried code, cursor, codium, code-insiders)."
  print $"Install ($ext) from your editor's Extensions view, or enable the shell"
  print "command first: Cmd/Ctrl+Shift+P → 'Shell Command: Install code in PATH'."
  print "Source: https://github.com/cedar-policy/vscode-cedar"
  exit 1
}
print $"Installing ($ext) via ($cli) ..."
^$cli --install-extension $ext --force
print $"Installed via ($cli). .vscode/extensions.json also recommends it on repo open."
"""

[tasks."cedar:mcp:install"]
description = "Clone cedar-policy/cedar-for-agents into $CEDAR_AGENTS_DIR (if absent) and build the analysis MCP server (npm ci + tsc → dist/server.js). Upstream ships it Docker-only; we build from source with the mise node toolchain instead."
shell = "nu -c"
run = """
if not ($env.CEDAR_AGENTS_DIR | path exists) {
  print $"cloning ($env.CEDAR_AGENTS_REPO) → ($env.CEDAR_AGENTS_DIR)"
  git clone $"https://github.com/($env.CEDAR_AGENTS_REPO).git" $env.CEDAR_AGENTS_DIR
} else {
  print $"($env.CEDAR_AGENTS_DIR) present — git pull --ff-only"
  git -C $env.CEDAR_AGENTS_DIR pull --ff-only
}
cd $env.CEDAR_MCP_DIR
print "npm ci ..."
npm ci
print "npm run build (tsc) ..."
npm run build
print ""
print "built. next: `mise run cedar:mcp:config` to get the JSON block for your MCP client."
"""

[tasks."cedar:mcp:config"]
description = "Print the mcpServers JSON block for the Cedar analysis MCP server (verify-policy-changes / detect-policy-issues), pointing node at the locally-built dist/server.js. Paste into your Claude/Q MCP config."
shell = "nu -c"
run = """
let server = $"($env.CEDAR_MCP_DIR)/dist/server.js"
if not ($server | path exists) {
  print $"not built yet: ($server) missing — run `mise run cedar:mcp:install` first."
  exit 1
}
let abs = ($server | path expand)
let node = (which node | get path.0?)
print "── paste into your MCP client config (e.g. ~/.claude.json mcpServers, or ~/.aws/amazonq/mcp.json) ──"
print ({
  mcpServers: {
    "cedar-analysis": {
      command: ($node | default "node"),
      args: [$abs],
      env: {}
    }
  }
} | to json --indent 2)
print ""
print "tools exposed: verify-policy-changes, detect-policy-issues, add-and-verify-new-policy-workflow"
print "point it at examples/remy-sport-policies/policies/*.cedar to reason about the remy-sport matrix."
"""

[tasks."cedar:schema:from-mcp"]
description = "Generate a Cedar schema from an MCP tool-description manifest (cedar-policy-mcp-schema-generator generate). Usage: mise run cedar:schema:from-mcp -- <schema-stub.cedarschema> <tool-descriptions.json> [output.cedarschema]"
shell = "nu -c"
usage = '''
arg "schema_stub" help="Cedar schema stub file used as the base (actions get appended to it)"
arg "tool_descriptions" help="JSON file of MCP tool descriptions to turn into Cedar actions"
arg "output" help="Where to write the generated schema (default: stdout)" default=""
'''
run = """
if ($env.usage_output | is-empty) {
  cedar-policy-mcp-schema-generator generate $env.usage_schema_stub $env.usage_tool_descriptions
} else {
  cedar-policy-mcp-schema-generator generate $env.usage_schema_stub $env.usage_tool_descriptions --output $env.usage_output
  print $"wrote ($env.usage_output)"
}
"""

